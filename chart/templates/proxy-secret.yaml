{{- if .Values.oauthProxy.enabled }}
{{- $name := printf "%s-proxy" (include "kubertree.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $session := randAlphaNum 32 }}
{{- if $existing }}
{{- $session = index $existing.data "session_secret" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "kubertree.labels" . | nindent 4 }}
type: Opaque
stringData:
  session_secret: {{ $session | quote }}
{{- end }}
