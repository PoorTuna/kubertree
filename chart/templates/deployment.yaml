apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubertree.fullname" . }}
  labels:
    {{- include "kubertree.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubertree.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubertree.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kubertree.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
      containers:
        - name: kubertree
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
