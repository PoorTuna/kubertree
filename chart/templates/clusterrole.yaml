{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubertree.fullname" . }}
  labels:
    {{- include "kubertree.labels" . | nindent 4 }}
rules:
  # Read every resource to build the ownership hierarchy and read pod specs.
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Live usage from the metrics API.
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  # Cascade delete of any owner the user selects in the UI.
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["delete"]
{{- end }}
